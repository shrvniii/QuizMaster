<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | {{ COMPETITION_NAME }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary-color: #0D2B4E;
            --accent-color: #1565C0;
            --bg-color: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-primary: #1A1A2E;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --danger-color: #B71C1C;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-primary);
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        
        .login-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        
        .login-header {
            background-color: var(--primary-color);
            color: #FFFFFF;
            padding: 32px 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        
        .login-logo {
            font-size: 36px;
            color: #F57F17;
        }
        
        .login-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .login-subtitle {
            font-size: 13px;
            color: #94A3B8;
            margin-top: 4px;
        }
        
        .login-body {
            padding: 32px 24px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-icon {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 16px;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }
        
        .form-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(21, 101, 192, 0.15);
        }
        
        .btn-login {
            width: 100%;
            background-color: var(--accent-color);
            color: #FFFFFF;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        
        .btn-login:hover {
            background-color: #0D47A1;
        }
        
        .error-list {
            list-style: none;
            background-color: #FDE8E8;
            color: var(--danger-color);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            border: 1px solid #F8B4B4;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="/static/images/bvp_logo.jpg" alt="BVP Logo" style="height: 60px; width: auto; border-radius: 8px; background-color: white; padding: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); margin-bottom: 8px;">
                <div>
                    <h2 class="login-title">BKJ-QMS</h2>
                    <p class="login-subtitle">Bharat Ko Jano Quiz Management</p>
                </div>
            </div>
            
            <div class="login-body">
                {% if form.errors %}
                    <ul class="error-list">
                        {% for field in form %}
                            {% for error in field.errors %}
                                <li><i class="bi bi-exclamation-circle-fill"></i> {{ error }}</li>
                            {% endfor %}
                        {% endfor %}
                        {% for error in form.non_field_errors %}
                            <li><i class="bi bi-exclamation-circle-fill"></i> {{ error }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}
                
                <form method="post" action="{% url 'accounts:login' %}">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label for="id_username" class="form-label">Username</label>
                        <div class="input-wrapper">
                            <i class="bi bi-person input-icon"></i>
                            <input type="text" name="username" autofocus required id="id_username" class="form-control" placeholder="Enter username">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="id_password" class="form-label">Password</label>
                        <div class="input-wrapper">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" name="password" required id="id_password" class="form-control" placeholder="Enter password">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-login">
                        <span>Sign In</span>
                        <i class="bi bi-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
